persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# Authentication and authorization (global for all listeners)
allow_anonymous true

# Load optional configs (e.g. bridge)
include_dir /mosquitto/config/conf.d

# Plain MQTT for internal traffic
listener 1883 0.0.0.0
protocol mqtt

# MQTT over TLS for external secure clients
listener 8883 0.0.0.0
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false

# MQTT over WebSocket for browser/web app
listener 9001 0.0.0.0
protocol websockets
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
