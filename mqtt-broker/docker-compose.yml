
services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: satways-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/certs:/mosquitto/certs
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -u ${MQTT_ADMIN_USER:-admin} -P ${MQTT_ADMIN_PASSWORD:-admin123} -t '$$SYS/broker/version' -C 1 -W 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
